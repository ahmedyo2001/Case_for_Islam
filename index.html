<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case for Islam</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#0a0a0a;color:#f0ede8;min-height:100vh;}

.wrap{max-width:900px;margin:0 auto;padding:0 0 4rem;}

.hero{text-align:center;padding:5rem 2rem 3rem;}
.hero-arabic{font-size:32px;letter-spacing:.04em;color:#555;margin-bottom:1.5rem;font-weight:300;}
.hero-title{font-family:'Playfair Display',serif;font-size:56px;font-weight:600;line-height:1.1;margin-bottom:.5rem;}
.hero-title em{font-style:italic;color:#888;}
.hero-sub{font-size:15px;color:#666;line-height:1.7;max-width:420px;margin:1.25rem auto 2.5rem;font-weight:300;}
.start-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 30px;background:#f0ede8;color:#0a0a0a;border:none;border-radius:999px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.02em;transition:opacity .15s;}
.start-btn:hover{opacity:.85;}

.tree-area{padding:0 2rem;display:none;}
.canvas-wrap{position:relative;width:100%;}
canvas{display:block;width:100%;}
.nodes-layer{position:absolute;top:0;left:0;width:100%;pointer-events:none;}

.tree-node{position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;}
.node-pill{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:0.5px solid #2a2a2a;border-radius:999px;
  background:#111;padding:10px 20px;min-width:110px;text-align:center;
  transition:border-color .25s,background .25s,transform .2s,opacity .4s;
  opacity:0;
}
.tree-node.visible .node-pill{opacity:1;}
.node-pill:hover{background:#1a1a1a;border-color:#444;transform:scale(1.06);}
.node-pill.active{border-color:#f0ede8;border-width:1px;}
.node-letter{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;line-height:1;color:#f0ede8;}
.node-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#555;margin-top:3px;}
.node-pill.active .node-label{color:#999;}

.root-node .node-pill{padding:14px 28px;min-width:150px;border-color:#222;cursor:default;}
.root-node .node-pill:hover{transform:none;background:#111;}
.root-node .node-letter{font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:.02em;}

.detail-panel{
  margin:2rem 2rem 0;border:0.5px solid #1e1e1e;border-radius:16px;overflow:hidden;
  opacity:0;max-height:0;transition:opacity .35s ease,max-height .5s ease;
}
.detail-panel.open{opacity:1;max-height:3600px;}

.panel-head{padding:1.5rem 1.75rem;border-bottom:0.5px solid #1a1a1a;background:#0f0f0f;}
.panel-tag{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:.5rem;}
.panel-q{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;line-height:1.2;color:#f0ede8;}
.panel-desc{font-size:14px;color:#666;margin-top:.5rem;font-weight:300;line-height:1.6;font-style:italic;}

.args-list{padding:1.25rem 1.75rem;display:flex;flex-direction:column;gap:8px;background:#0a0a0a;}

.arg{border:0.5px solid #1a1a1a;border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s;}
.arg:hover{border-color:#2a2a2a;}
.arg.open{border-color:#333;}
.arg-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px;}
.arg-name{font-size:14px;font-weight:500;color:#d0cdc8;}
.arg-icon{font-size:16px;color:#444;transition:transform .2s;flex-shrink:0;}
.arg.open .arg-icon{transform:rotate(45deg);color:#888;}
.arg-body{
  display:none;padding:12px 16px;
  font-size:13px;color:#777;line-height:1.75;font-weight:300;
  border-top:0.5px solid #1a1a1a;background:#0d0d0d;
}
.arg.open .arg-body{display:block;}
.arg-quote{
  border-left:1px solid #333;padding-left:12px;margin:10px 0;
  font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#666;
}

.panel-foot{
  padding:1rem 1.75rem;border-top:0.5px solid #1a1a1a;
  display:flex;align-items:center;justify-content:space-between;background:#0f0f0f;
}
.foot-text{font-size:12px;color:#555;}
.foot-text strong{color:#888;font-weight:500;}
.foot-btn{font-size:12px;font-weight:500;color:#7a9cff;background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;padding:0;}
.foot-btn:hover{text-decoration:underline;}

.done-banner{
  margin:2rem;padding:2rem;border:0.5px solid #1e1e1e;border-radius:16px;
  text-align:center;display:none;background:#0f0f0f;
}
.done-banner.show{display:block;}
.done-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;margin-bottom:.5rem;}
.done-sub{font-size:14px;color:#666;font-weight:300;margin-bottom:1.25rem;}
.done-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:#f0ede8;color:#0a0a0a;border:none;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;}

@media(max-width:600px){
  .hero-title{font-size:38px;}
  .tree-area{padding:0 1rem;}
  .detail-panel{margin:1.5rem 1rem 0;}
  .done-banner{margin:1.5rem 1rem;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero" id="hero">
    <div class="hero-arabic">بِسْمِ ٱللَّٰهِ</div>
    <div class="hero-title">The Case<br>for <em>Islam</em></div>
    <div class="hero-sub">A structured, rational argument for Islam — from first principles to the final revelation.</div>
    <button class="start-btn" id="startBtn">
      <i class="ti ti-arrow-right"></i>
      Explore the argument
    </button>
  </div>

  <div class="tree-area" id="treeArea">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="treeCanvas"></canvas>
      <div class="nodes-layer" id="nodesLayer"></div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="panel-head">
        <div class="panel-tag" id="panelTag"></div>
        <div class="panel-q" id="panelQ"></div>
        <div class="panel-desc" id="panelDesc"></div>
      </div>
      <div class="args-list" id="argsList"></div>
      <div class="panel-foot">
        <div class="foot-text"><strong>Know a stronger argument?</strong> Help build the case.</div>
        <button class="foot-btn" id="suggestBtn">Suggest one →</button>
      </div>
    </div>
    <div class="done-banner" id="doneBanner">
      <div class="done-title">You've heard the case.</div>
      <div class="done-sub">If something resonated — or if you have questions — we'd love to continue the conversation.</div>
      <button class="done-btn" onclick="window.location.href='mailto:ahmedyo2001@gmail.com'">
        <i class="ti ti-message"></i> Get in touch
      </button>
    </div>
  </div>

</div>
<script>
const DATA = [
  {
    id:'root', label:'Case for Islam', letter:'',
    tag:'', q:'', desc:'', args:[],
    x:.5, y:.1
  },
  {
    id:'G', letter:'G', label:'God exists',
    tag:'Step 1 · God\'s existence', q:'Does God exist?',
    desc:'Before anything else — does a creator exist at all?',
    args:[
      {name:'The cosmological argument', body:'Everything that begins to exist has a cause. The universe began to exist — confirmed by modern cosmology and the Big Bang. Therefore the universe has a cause that itself did not begin: an uncaused, eternal, immensely powerful being outside of space and time.'},
      {name:'The fine-tuning argument', body:'The fundamental constants of nature — gravity, the cosmological constant, the strong nuclear force — are calibrated to extraordinary precision. A tiny deviation in any of them and no stars, planets, or life could exist. The probability of this arising by chance is so small as to be effectively impossible. Design is the most rational explanation.'},
      {name:'The moral argument', body:'Objective moral values exist — torturing children for pleasure is wrong regardless of what any culture believes. But objective morality requires a standard beyond matter or evolution, which can only ground relative preferences. A transcendent moral lawgiver is the best explanation.'},
      {name:'The argument from design', body:"Everyday objects that show order and complexity always turn out to have a designer behind them. If you found a working watch on a beach, you would never assume the parts assembled themselves by chance — you would recognise it was made by someone. The same logic applies to something as simple as a water bottle, or to the word 'hello' written in the sand: order points to an author, not to chance. The universe displays vastly more order and complexity than any of these — from the laws of physics down to a single solar system — making the case for a Designer even stronger."},
      {name:'Fine-tuning of our solar system', body:"Beyond the cosmic constants, our own solar system shows remarkable precision. The sun sits at almost exactly the right distance from Earth — any closer and we would burn, any further and we would freeze. Earth's axial tilt keeps the seasons stable, the size of the moon helps regulate the length of our day, the strength of gravity holds everything in place without crushing it, and the ozone layer shields life from harmful radiation. Each factor on its own would be a remarkable coincidence; together, they read less like accident and more like design."}
    ],
    x:.1, y:.55
  },
  {
    id:'O', letter:'O', label:'One God',
    tag:'Step 2 · God\'s oneness', q:'Is there only one God?',
    desc:'If a creator exists, could there be more than one?',
    args:[
      {name:'The argument from omnipotence', body:'True omnipotence cannot be shared. If two beings each claim to be all-powerful, they would inevitably conflict — and the one who is overruled is not truly omnipotent. Therefore only one omnipotent being can exist.'},
      {name:'The argument from simplicity', body:'A single, uncaused, all-powerful being is the most parsimonious explanation for the universe. Postulating multiple gods raises further unanswered questions: who created them? How do they coordinate? Occam\'s razor favours one.'},
      {name:'The argument from universal order', body:'The cosmos operates under one consistent set of physical laws across billions of light years. This unified coherence points to a single will behind creation — not a committee of competing gods.'},
      {name:'The argument from conflicting wills', body:"Imagine two equally all-powerful gods, one wanting a room painted yellow and the other wanting it painted blue. If both are truly omnipotent, neither can be overruled — so the result is not a paint job at all, but paradox. Multiple gods with independent, potentially conflicting wills would produce contradiction and breakdown rather than the stable, consistent laws that govern the entire universe. The order actually observed — one set of physical laws operating the same way across billions of light years — fits far better with a single will behind it all (echoed in the Quran, 21:22)."},
      {name:'The argument against infinite regress', body:"A natural question follows: if everything needs a creator, who created God? But an infinite chain of creators could never actually get anything started — much like an echo cannot have been bouncing forever with no original sound, or a line of neighbours who each refuse to help unless their neighbour helps first will never get the job done. For the universe to exist at all, there must be one being at the start of the chain who is uncreated and self-sufficient. And just as a carpenter is not made of the same material as the chair he builds, this uncreated creator is necessarily different in nature from the created universe — not a part of it, dependent on it, or limited by it."}
    ],
    x:.37, y:.55
  },
  {
    id:'R', letter:'R', label:'Revelation',
    tag:'Step 3 · Revelation', q:'Would God send guidance?',
    desc:'If God exists and is one, would He communicate with humanity — and does the Quran show the marks of being that communication?',
    args:[
      {name:'The argument from purpose', body:'A God who creates conscious beings capable of asking "why am I here?" — and then provides no answer — is inconsistent with perfect wisdom and care. If God is all-knowing and all-caring, guidance to humanity follows necessarily.'},
      {name:'The argument from human need', body:'Every human civilisation in history has sought guidance on how to live — moral frameworks, sacred texts, prophetic figures. This is a universal human need. A just God who implanted this need would not leave it permanently unaddressed.'},
      {name:'The instruction manual analogy', body:"Every product you buy — a phone, a washing machine, even simple furniture — comes with a manual explaining how to use it, along with warnings about misuse. A creator who designed human beings with such care, and who provides for basic needs like food, water and air, would be expected to also provide guidance on how those human beings are meant to live — a kind of manual for life. This is precisely the role the Quran describes for itself: practical guidance covering honesty, charity, family life, and how to treat others, alongside its account of where we came from and why."},
      {name:'The literary miracle', body:'The Quran challenged the finest poets and linguists of Arabia to produce even one chapter comparable to it. Fourteen centuries later, that challenge stands unmet. Arab scholars who rejected Islam nonetheless acknowledged its unparalleled power.', quote:'"This is not the speech of a human being." — Walid ibn al-Mughira, one of Islam\'s earliest opponents'},
      {name:'Perfect preservation', body:'The Quran is the only ancient scripture with an unbroken, documented chain of memorisation across 1400 years. Millions of Muslims today recite the exact same text — word for word — as was revealed to the Prophet ﷺ.'},
      {name:'Scientific foreknowledge', body:'The Quran contains accurate descriptions of embryological development, the expansion of the universe, and the barrier between bodies of water — phenomena not known to 7th century Arabia and only confirmed by modern science centuries later.'},
      {name:'Mountains and the origin of life', body:"The Quran describes mountains as pegs or stakes anchoring the earth (78:6-7) — and modern geology has confirmed that mountains have deep roots extending far below the surface into the crust, anchoring the tectonic plates in a way that is invisible from above ground. Separately, the Quran states that every living thing was made from water (21:30), matching the modern understanding that water is essential to all known life and is the very first thing scientists look for when searching for life elsewhere in the universe. Neither fact could have been confirmed with the instruments available in 7th-century Arabia."},
      {name:'The fulfilled prophecy', body:"The Quran contains specific predictions that came true after it was revealed. Early in Surah Ar-Rum, revealed shortly after the Byzantines (the 'Romans') suffered a heavy defeat to the Persians, the Quran predicted that the Romans would be victorious again within a specified number of years (30:2-4) — at a moment when such a reversal looked highly unlikely. According to early sources, the prophecy was fulfilled within that timeframe, something that could not have been reliably guessed from the political situation of the time."}
    ],
    x:.63, y:.55
  },
  {
    id:'P', letter:'P', label:'Prophet ﷺ',
    tag:'Step 4 · Prophethood', q:'Was Muhammad ﷺ a true prophet?',
    desc:'Was he genuinely sent by God — or a fraud, a madman, or mistaken?',
    args:[
      {name:'The character argument', body:'Before prophethood, Muhammad ﷺ was known unanimously as Al-Amin — the trustworthy. His fiercest enemies, who rejected his message completely, never accused him of lying in his personal life. A man of such established integrity does not fabricate the most consequential claim in human history.'},
      {name:'No worldly motive', body:'Muhammad ﷺ gained nothing materially from his message for 13 years — only persecution, social boycott, and the loss of loved ones. The leaders of Quraysh offered him wealth, power, and status to stop. He refused every offer.', quote:'"By God, if they placed the sun in my right hand and the moon in my left to abandon this matter, I would not abandon it."'},
      {name:'The civilisational transformation', body:'An illiterate man in 7th century Arabia produced, within 23 years, a complete civilisational framework — legal, moral, spiritual, scientific — that transformed a fragmented tribal society into a global civilisation spanning three continents. No naturalistic explanation is adequate.'},
      {name:'The trilemma: liar, deluded, or true', body:"If Muhammad ﷺ was not telling the truth about receiving revelation, only two alternatives remain: he was deliberately lying, or he was sincerely mistaken. The 'liar' option sits awkwardly with his reputation — even his harshest opponents, who rejected his message entirely, never accused him of personal dishonesty, and a liar chasing worldly gain would not endure thirteen years of persecution while turning down every offer of wealth and power. The 'deluded' option is no easier: someone simply mistaken about receiving revelation would not be expected to produce a text with the linguistic precision, internal consistency, and depth of content found in the Quran. Once both alternatives are set aside, the remaining explanation is that he was telling the truth."},
      {name:'The argument from self-critical verses', body:"If Muhammad ﷺ had written the Quran himself to serve his own interests, it is hard to explain why it contains verses that gently correct or address him personally. In Surah Abasa, he is corrected for turning away from a blind man seeking knowledge; elsewhere, verses speak directly to his personal conduct (66:1, 33:37). A person fabricating scripture to elevate his own authority would have little reason to include passages recording his own missteps — their presence fits more naturally with a text he received than one he composed for himself."}
    ],
    x:.9, y:.55
  }
];

const EDGES = [['root','G'],['root','O'],['root','R'],['root','P']];

let W=0,H=0,ctx=null,nodeEls={},activeId=null,animated=false;

function initCanvas(){
  const wrap=document.getElementById('canvasWrap');
  const canvas=document.getElementById('treeCanvas');
  W=wrap.clientWidth;
  H=Math.round(W*.58);
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.height=H+'px';
  document.getElementById('nodesLayer').style.height=H+'px';
  ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
}

function drawBranch(x1,y1,x2,y2,progress){
  if(progress<=0)return;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=1;
  const cp1x=x1,cp1y=y1+(y2-y1)*.45;
  const cp2x=x2,cp2y=y1+(y2-y1)*.55;
  const pts=[];
  for(let i=0;i<=30;i++){
    const t=i/30*progress;
    const mt=(1-t)**3,m1=3*(1-t)**2*t,m2=3*(1-t)*t**2,m3=t**3;
    pts.push([mt*x1+m1*cp1x+m2*cp2x+m3*x2,mt*y1+m1*cp1y+m2*cp2y+m3*y2]);
  }
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  ctx.restore();
}

function placeNodes(){
  const layer=document.getElementById('nodesLayer');
  layer.innerHTML=''; nodeEls={};
  DATA.forEach(node=>{
    const el=document.createElement('div');
    el.className='tree-node'+(node.id==='root'?' root-node':'');
    el.id='node-'+node.id;
    el.style.left=(node.x*100)+'%';
    el.style.top=(node.y*100)+'%';
    const pill=document.createElement('div');
    pill.className='node-pill';
    if(node.id==='root'){
      pill.innerHTML=`<div class="node-letter">${node.label}</div>`;
    } else {
      pill.innerHTML=`<div class="node-letter">${node.letter}</div><div class="node-label">${node.label}</div>`;
      el.addEventListener('click',()=>selectNode(node.id));
    }
    el.appendChild(pill);
    layer.appendChild(el);
    nodeEls[node.id]=el;
  });
}

function animateTree(){
  if(animated)return;
  animated=true;
  let step=0;
  const total=70;
  function tick(){
    ctx.clearRect(0,0,W,H);
    const root=DATA[0];
    const rx=root.x*W,ry=root.y*H;
    DATA.slice(1).forEach(node=>{
      const progress=Math.min(1,Math.max(0,(step-15)/45));
      drawBranch(rx,ry,node.x*W,node.y*H,progress);
    });
    if(step===12) nodeEls['root'].classList.add('visible');
    if(step===40) DATA.slice(1).forEach((node,i)=>setTimeout(()=>nodeEls[node.id].classList.add('visible'),i*100));
    step++;
    if(step<total+10) requestAnimationFrame(tick);
  }
  tick();
}

function redraw(){
  if(!ctx)return;
  ctx.clearRect(0,0,W,H);
  const root=DATA[0];
  const rx=root.x*W,ry=root.y*H;
  DATA.slice(1).forEach(node=>drawBranch(rx,ry,node.x*W,node.y*H,1));
}

function selectNode(id){
  if(activeId===id){
    activeId=null;
    document.querySelectorAll('.node-pill').forEach(p=>p.classList.remove('active'));
    document.getElementById('detailPanel').classList.remove('open');
    checkDone();
    return;
  }
  activeId=id;
  document.querySelectorAll('.node-pill').forEach(p=>p.classList.remove('active'));
  nodeEls[id].querySelector('.node-pill').classList.add('active');

  const node=DATA.find(d=>d.id===id);
  document.getElementById('panelTag').textContent=node.tag;
  document.getElementById('panelQ').textContent=node.q;
  document.getElementById('panelDesc').textContent=node.desc;
  document.getElementById('suggestBtn').onclick=()=>window.location.href='mailto:ahmedyo2001@gmail.com?subject='+encodeURIComponent('Argument suggestion: '+node.tag);

  const list=document.getElementById('argsList');
  list.innerHTML='';
  node.args.forEach(arg=>{
    const el=document.createElement('div');
    el.className='arg';
    let bodyHTML=arg.body;
    if(arg.quote) bodyHTML+=`<div class="arg-quote">${arg.quote}</div>`;
    el.innerHTML=`<div class="arg-head"><div class="arg-name">${arg.name}</div><i class="ti ti-plus arg-icon"></i></div><div class="arg-body">${bodyHTML}</div>`;
    el.addEventListener('click',()=>{
      const wasOpen=el.classList.contains('open');
      list.querySelectorAll('.arg').forEach(a=>a.classList.remove('open'));
      if(!wasOpen)el.classList.add('open');
    });
    list.appendChild(el);
  });

  const panel=document.getElementById('detailPanel');
  panel.classList.add('open');
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),150);
  checkDone();
}

const visited=new Set();
function checkDone(){
  if(activeId) visited.add(activeId);
  if(visited.size===4) document.getElementById('doneBanner').classList.add('show');
}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('hero').style.display='none';
  document.getElementById('treeArea').style.display='block';
  setTimeout(()=>{initCanvas();placeNodes();animateTree();},50);
});

window.addEventListener('resize',()=>{
  if(!animated)return;
  initCanvas();placeNodes();redraw();
  document.querySelectorAll('.tree-node').forEach(n=>n.classList.add('visible'));
  if(activeId) nodeEls[activeId].querySelector('.node-pill').classList.add('active');
});
</script>
</body>
</html>
